<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>原产地判定 - 用户端</title>
    <link rel="stylesheet" href="../static/css/sweetalert2.min.css" />
    <link rel="stylesheet" href="../static/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../static/css/nav.css" />
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        min-height: 100vh;
        padding-left: 0;
        transition: padding-left 0.3s ease;
        margin: 0;
        color: #1d2129;
        background-color: #f9fafc;
        padding-left: 250px;
      }

      /* 主内容区域 */
      .content {
        padding: 2rem;
        max-width: 1200px;
        margin-top: 70px;
        margin-left: auto;
        margin-right: auto;
      }

      .content-text {
        color: #165dff;
        font-weight: 600;
        margin-bottom: 1.5rem;
        position: relative;
        padding-bottom: 0.75rem;
      }

      .content-text::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 60px;
        height: 3px;
        background-color: #165dff;
        border-radius: 3px;
      }

      /* 表单样式 */
      #judgeForm {
        background-color: #ffffff;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 2rem;
        max-width: 800px;
      }

      .form-label {
        font-weight: 500;
        color: #1d2129;
        margin-bottom: 0.5rem;
      }

      .form-control,
      .form-select {
        border: 1px solid #e5e6eb;
        padding: 0.75rem 1rem;
        font-size: 16px;
        border-radius: 8px;
        transition: 0.3s ease;
      }

      .btn-primary {
        background-color: #165dff;
        border-color: #165dff;
        padding: 0.75rem 1.5rem;
        font-weight: 500;
        border-radius: 8px;
        transition: 0.3s ease;
        margin-top: 0.5rem;
      }

      .btn-primary:hover {
        background-color: #4080ff;
        border-color: #4080ff;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* 判定结果区域 */
      #resultArea {
        background-color: #ffffff;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        max-width: 800px;
      }

      #resultArea h4 {
        color: #1d2129;
        font-weight: 600;
        margin-bottom: 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #eff2f7;
      }

      #resultArea h5 {
        color: #1d2129;
        font-weight: 600;
        margin: 1.5rem 0 1rem;
      }

      /* 步骤结果样式 */
      .step-result {
        border: 1px solid #eff2f7;
        border-radius: 10px;
        padding: 1.25rem;
        margin: 1rem 0;
        background-color: #ffffff;
        transition: 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .step-result.pass {
        border-left: 5px solid #00b42a;
        background-color: #f6ffed;
      }

      .step-result.fail {
        border-left: 5px solid #f53f3f;
        background-color: #fff2f3;
      }

      .step-result:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transform: translateY(-1px);
      }

      .step-result .h6 {
        font-weight: 600;
        color: #1d2129;
      }

      /* 最终结果样式 */
      #finalResult .text-success {
        color: #00b42a !important;
        font-weight: 600;
      }

      #finalResult .text-danger {
        color: #f53f3f !important;
        font-weight: 600;
      }

      #finalResult .text-secondary {
        color: #86909c !important;
      }

      /* 原产地证明区域 */
      #certificateArea {
        margin-top: 2rem;
        padding: 1.5rem;
        border: 1px solid #eff2f7;
        border-radius: 10px;
        background-color: #f0f7ff !important;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      #certificateArea h5 {
        color: #165dff;
        margin-bottom: 1rem;
      }

      #certificateTemplate {
        background-color: #ffffff;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid #e5e6eb;
        font-size: 14px;
        line-height: 1.6;
        max-height: 300px;
        overflow-y: auto;
      }

      /* 加载动画 */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        visibility: hidden;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #165dff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* 响应式适配 */
      @media (max-width: 768px) {
        .navbar-brand {
          position: relative;
          right: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" id="sidebarToggle">
          <span class="navbar-toggler-icon"></span>
        </button>
        <p class="navbar-brand ms-3">原产地判定系统 - 用户端</p>
      </div>
    </nav>

    <!-- 侧边导航 -->
    <div class="sidebar">
      <div class="sidebar-sticky">
        <ul class="nav flex-column">
          <li class="nav-item mb-1">
            <a class="nav-link" href="policy_query.html">
              <i class="bi bi-search"></i> 规则指南
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="product_manage.html">
              <i class="bi bi-box-seam"></i> 产品信息管理
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="rvc_calculator.html">
              <i class="bi bi-calculator"></i> RVC计算器
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link active" href="origin_judge.html">
              <i class="bi bi-journal-check"></i> 原产地判定
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="../index.html">
              <i class="bi bi-house"></i> 返回首页
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="content container-fluid">
      <h2 class="content-text">原产地判定</h2>

      <form id="judgeForm" class="mt-4">
        <div class="mb-3">
          <label class="form-label">选择产品</label>
          <select class="form-select" id="productSelect" required>
            <option value="">请选择产品</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">选择贸易规则</label>
          <select class="form-select" id="ruleSelect" required>
            <option value="RCEP">RCEP</option>
            <option value="CAI">中澳自贸协定</option>
            <option value="CPTPP">CPTPP</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">开始判定</button>
      </form>

      <!-- 判定结果区域 -->
      <div class="mt-5" id="resultArea" style="display: none">
        <h4>判定结果</h4>
        <div class="mb-3">
          <span class="h5">最终结果：</span>
          <span id="finalResult" class="h5"></span>
        </div>

        <!-- 步骤结果 -->
        <h5>判定步骤详情</h5>
        <div id="stepResults"></div>

        <!-- 总建议 -->
        <div class="mt-3">
          <h5>改进建议：</h5>
          <p id="totalSuggestion" class="text-muted"></p>
        </div>

        <!-- 原产地证明模板（通过时显示） -->
        <div id="certificateArea" style="display: none">
          <h5>
            <i class="bi bi-file-earmark-text me-2"></i>原产地证明申请模板
          </h5>
          <pre id="certificateTemplate" class="mt-2"></pre>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      // DOM 加载完成后执行
      document.addEventListener("DOMContentLoaded", function () {
        // 加载产品列表
        loadProductList();

        // 表单提交
        const judgeForm = document.getElementById("judgeForm");
        if (judgeForm) {
          judgeForm.addEventListener("submit", function (e) {
            e.preventDefault();
            startJudge();
          });
        }
      });

      // 显示/隐藏加载动画
      function showLoading() {
        document.getElementById("loadingOverlay").style.visibility = "visible";
      }
      function hideLoading() {
        document.getElementById("loadingOverlay").style.visibility = "hidden";
      }

      // 加载产品列表
      function loadProductList() {
        const productSelect = document.getElementById("productSelect");
        if (!productSelect) return;

        showLoading();

        fetch("/api/user/product_list", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ page: 1, per_page: 1000 }),
        })
          .then((response) => response.json())
          .then((res) => {
            hideLoading();
            if (res.code === 200) {
              const products = res.data.items || res.data || [];
              productSelect.innerHTML = '<option value="">请选择产品</option>';
              products.forEach((p) => {
                const option = document.createElement("option");
                option.value = p.id;
                option.textContent = `${p.product_name}（HS:${p.hs_code}）`;
                productSelect.appendChild(option);
              });
            } else {
              Swal.fire({ icon: "error", title: "加载失败", text: res.msg });
            }
          })
          .catch((error) => {
            hideLoading();
            console.error("加载产品列表失败:", error);
            Swal.fire({ icon: "error", title: "网络错误", text: "请稍后重试" });
          });
      }

      // 开始判定（保持不变）
      function startJudge() {
        const productSelect = document.getElementById("productSelect");
        const ruleSelect = document.getElementById("ruleSelect");
        const resultArea = document.getElementById("resultArea");
        const finalResult = document.getElementById("finalResult");
        const stepResults = document.getElementById("stepResults");
        const totalSuggestion = document.getElementById("totalSuggestion");
        const certificateArea = document.getElementById("certificateArea");
        const certificateTemplate = document.getElementById(
          "certificateTemplate",
        );

        const productId = productSelect.value;
        const ruleName = ruleSelect.value;

        if (!productId) {
          alert("请选择产品");
          return;
        }

        resultArea.style.display = "block";
        finalResult.innerHTML = '<span class="text-secondary">判定中...</span>';
        stepResults.innerHTML =
          '<div class="text-center">正在执行判定步骤...</div>';
        totalSuggestion.textContent = "";
        if (certificateArea) certificateArea.style.display = "none";

        fetch("/api/user/origin_judge", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            product_id: productId,
            rule_name: ruleName,
          }),
        })
          .then((response) => response.json())
          .then((res) => {
            if (res.code === 200) {
              const data = res.data;
              if (data.final_pass) {
                finalResult.innerHTML =
                  '<span class="text-success">通过</span>';
                if (certificateArea) certificateArea.style.display = "block";
                if (certificateTemplate)
                  certificateTemplate.textContent = data.certificate_template;
              } else {
                finalResult.innerHTML =
                  '<span class="text-danger">不通过</span>';
                if (certificateArea) certificateArea.style.display = "none";
              }

              let stepHtml = "";
              data.step_results.forEach(function (step) {
                const stepClass = step.is_pass ? "pass" : "fail";
                const stepResult = step.is_pass ? "通过" : "不通过";
                stepHtml += `
                    <div class="step-result ${stepClass}">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="h6">判定步骤：${step.step}</span>
                            <span class="${step.is_pass ? "text-success" : "text-danger"}">${stepResult}</span>
                        </div>
                        <p class="mt-2 mb-0">说明：${step.suggestion}</p>
                    </div>
                `;
              });
              stepResults.innerHTML = stepHtml;
              totalSuggestion.textContent = data.total_suggestion;
            } else {
              finalResult.innerHTML =
                '<span class="text-danger">判定失败</span>';
              stepResults.innerHTML = `<div class="text-danger">${res.msg}</div>`;
            }
          })
          .catch((error) => {
            finalResult.innerHTML = '<span class="text-danger">判定失败</span>';
            stepResults.innerHTML = `<div class="text-danger">${error.message || "网络错误，请重试"}</div>`;
          });
      }
    </script>
  </body>
</html>
