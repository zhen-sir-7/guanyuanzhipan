<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RVC计算器 - 用户端</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css" />
    <style>
      body {
        min-height: 100vh;
        padding-left: 0;
        transition: padding-left 0.3s ease;
        margin: 0;
        color: #1d2129;
        background-color: #f9fafc;
      }

      /* 侧边导航样式 */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 250px;
        z-index: 100;
        padding: 60px 0 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        background-color: #ffffff;
        overflow-y: auto;
        transform: translateX(-100%);
        transition: 0.3s ease;
        border-right: 1px solid #eff2f7;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      body.sidebar-open {
        padding-left: 250px;
      }

      .sidebar-sticky {
        position: relative;
        top: 0;
        height: calc(100vh - 60px);
        padding-top: 1rem;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .sidebar .nav-link {
        font-weight: 500;
        color: #4e5969;
        padding: 0.85rem 1.5rem;
        margin: 0 0.5rem;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s ease;
        border-left: 3px solid transparent;
        height: 54px;
      }

      .sidebar .nav-link i {
        font-size: 18px;
        width: 20px;
        text-align: center;
      }

      .sidebar .nav-link.active {
        color: #165dff;
        background-color: #e8f3ff;
        border-left: 3px solid #165dff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .sidebar .nav-link:hover {
        color: #165dff;
        background-color: #f0f7ff;
        border-left: 3px solid #4080ff;
      }

      /* 顶部导航栏 */
      .navbar {
        padding: 0.75rem 1.5rem;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 99;
        background-color: #ffffff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        height: 60px;
      }

      .navbar-toggler {
        margin-left: 0;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        position: relative;
        transition: 0.3s ease;
      }

      .navbar-toggler:hover {
        background-color: #f5f7fa;
      }

      #sidebarToggle {
        margin-left: 0;
        z-index: 101;
        min-width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .navbar-brand {
        position: fixed;
        right: 40px;
        margin-left: 1rem;
        color: #165dff !important;
        font-weight: 600;
        font-size: 18px;
        margin-bottom: 0;
      }

      /* 主内容区域 */
      .content {
        padding: 2rem;
        max-width: 1200px;
        margin-top: 70px;
        margin-left: auto;
        margin-right: auto;
      }

      .content-text {
        color: #165dff;
        font-weight: 600;
        margin-bottom: 1.5rem;
        position: relative;
        padding-bottom: 0.75rem;
      }

      .content-text::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 60px;
        height: 3px;
        background-color: #165dff;
        border-radius: 3px;
      }

      /* 表单样式 */
      #rvcForm {
        background-color: #ffffff;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-bottom: 2rem;
        max-width: 800px;
      }

      .form-label {
        font-weight: 500;
        color: #1d2129;
        margin-bottom: 0.5rem;
      }

      .form-control,
      .form-select {
        border: 1px solid #e5e6eb;
        padding: 0.75rem 1rem;
        font-size: 16px;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background-color: #165dff;
        border-color: #165dff;
        padding: 0.75rem 1.5rem;
        font-weight: 500;
        border-radius: 8px;
        transition: all 0.3s ease;
        margin-top: 0.5rem;
      }
      .btn-primary:hover {
        background-color: #4080ff;
        border-color: #4080ff;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* 计算结果区域 */
      #resultArea {
        background-color: #ffffff;
        padding: 1.5rem;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        max-width: 800px;
      }
      #resultArea h4 {
        color: #1d2129;
        font-weight: 600;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #eff2f7;
      }
      #resultArea p {
        font-size: 16px;
        line-height: 1.8;
        margin-bottom: 0.5rem;
      }
      #rvcValue {
        font-weight: 600;
        color: #165dff;
      }
      .text-success {
        color: #00b42a !important;
        font-weight: 600;
      }
      .text-danger {
        color: #f53f3f !important;
        font-weight: 600;
      }

      /* 加载动画 */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        visibility: hidden;
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #165dff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* 响应式适配 */
      @media (max-width: 768px) {
        .navbar-brand {
          position: relative;
          right: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" id="sidebarToggle">
          <span class="navbar-toggler-icon"></span>
        </button>
        <p class="navbar-brand ms-3">原产地判定系统 - 用户端</p>
      </div>
    </nav>

    <!-- 侧边导航 -->
    <div class="sidebar">
      <div class="sidebar-sticky">
        <ul class="nav flex-column">
          <li class="nav-item mb-1">
            <a class="nav-link" href="policy_query.html">
              <i class="bi bi-search"></i> 政策查询
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="product_manage.html">
              <i class="bi bi-box-seam"></i> 产品信息管理
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link active" href="rvc_calculator.html">
              <i class="bi bi-calculator"></i> RVC计算器
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="origin_judge.html">
              <i class="bi bi-journal-check"></i> 原产地判定
            </a>
          </li>
          <li class="nav-item mb-1">
            <a class="nav-link" href="../index.html">
              <i class="bi bi-house"></i> 返回首页
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="content container-fluid">
      <h2 class="content-text">RVC计算器</h2>

      <form id="rvcForm" class="mt-4">
        <div class="mb-3">
          <label class="form-label">选择产品</label>
          <select class="form-select" id="productSelect" required>
            <option value="">请选择产品</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">选择贸易规则</label>
          <select class="form-select" id="ruleSelect" required>
            <option value="RCEP">RCEP</option>
            <option value="CAI">中澳自贸协定</option>
            <option value="CPTPP">CPTPP</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">计算RVC</button>
      </form>

      <!-- 计算结果区域 -->
      <div class="mt-5" id="resultArea" style="display: none">
        <h4>计算结果</h4>
        <div class="mt-3">
          <p class="h5">RVC值：<span id="rvcValue" class="h5"></span>%</p>
          <p class="h5">判定结果：<span id="passResult" class="h5"></span></p>
          <p class="h5">建议：<span id="suggestion" class="h5"></span></p>
        </div>
      </div>
    </div>

    <!-- 引入图标和脚本 -->
    <link
      rel="stylesheet"
      href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css"
    />
    <script>
      // DOM 加载完成后执行
      document.addEventListener("DOMContentLoaded", function () {
        // 侧边栏切换逻辑
        const sidebarToggle = document.getElementById("sidebarToggle");
        sidebarToggle.addEventListener("click", function () {
          document.body.classList.toggle("sidebar-open");
        });

        // 加载产品列表
        loadProductList();

        // 表单提交事件
        const rvcForm = document.getElementById("rvcForm");
        rvcForm.addEventListener("submit", function (e) {
          e.preventDefault();
          calculateRVC();
        });
      });

      // 显示/隐藏加载动画
      function showLoading() {
        document.getElementById('loadingOverlay').style.visibility = 'visible';
      }
      function hideLoading() {
        document.getElementById('loadingOverlay').style.visibility = 'hidden';
      }

      // 加载产品列表（修复版）
      function loadProductList() {
        const productSelect = document.getElementById("productSelect");
        if (!productSelect) return;

        showLoading();

        fetch("/api/user/product_list", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          // 请求足够大的 per_page 以获取所有产品
          body: JSON.stringify({ page: 1, per_page: 1000 }),
        })
          .then((response) => response.json())
          .then((res) => {
            hideLoading();
            if (res.code === 200) {
              // 兼容分页返回和旧版直接数组返回
              const products = res.data.items || res.data || [];
              productSelect.innerHTML = '<option value="">请选择产品</option>';
              products.forEach((p) => {
                const option = document.createElement("option");
                option.value = p.id;
                option.textContent = `${p.product_name}（HS:${p.hs_code}）`;
                productSelect.appendChild(option);
              });
            } else {
              alert(res.msg);
            }
          })
          .catch((error) => {
            hideLoading();
            console.error("加载产品列表失败:", error);
            alert("加载产品列表失败，请刷新页面重试");
          });
      }

      // 计算RVC值（保持不变）
      function calculateRVC() {
        const productId = document.getElementById("productSelect").value;
        const ruleName = document.getElementById("ruleSelect").value;

        if (!productId) {
          alert("请选择产品");
          return;
        }

        showLoading();

        fetch("/api/user/calculate_rvc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            product_id: productId,
            rule_name: ruleName,
          }),
        })
          .then((response) => response.json())
          .then((res) => {
            hideLoading();
            if (res.code === 200) {
              document.getElementById("rvcValue").textContent = res.data.rvc_value;

              const passResult = document.getElementById("passResult");
              passResult.innerHTML = res.data.is_pass
                ? "<span class='text-success'>通过</span>"
                : "<span class='text-danger'>不通过</span>";

              document.getElementById("suggestion").textContent = res.data.suggestion;

              document.getElementById("resultArea").style.display = "block";
            } else {
              alert(res.msg);
            }
          })
          .catch((error) => {
            hideLoading();
            console.error("计算RVC失败:", error);
            alert("计算RVC失败，请稍后重试");
          });
      }
    </script>
  </body>
</html>
